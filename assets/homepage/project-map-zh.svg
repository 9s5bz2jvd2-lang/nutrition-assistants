<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-label="项目地图：一句话定位、四类读者入口、四块内容地图、状态说明与安全边界">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F6FF"/>
      <stop offset="55%" stop-color="#FDFCFF"/>
      <stop offset="100%" stop-color="#F1FAF7"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5E4BD8"/>
      <stop offset="100%" stop-color="#8A63E8"/>
    </linearGradient>
    <clipPath id="card">
      <rect x="1" y="1" width="1598" height="758" rx="26"/>
    </clipPath>
    <style>
      text { font-family: -apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans CJK SC',sans-serif; }
      .hdrLabel { font-size: 16px; font-weight: 600; fill: #DDD6FF; letter-spacing: 1.5px; }
      .hdrMain { font-size: 30px; font-weight: 700; fill: #FFFFFF; letter-spacing: 0.5px; }
      .chipText { font-size: 15.5px; font-weight: 700; fill: #FFFFFF; }
      .secLabel { font-size: 18px; font-weight: 700; fill: #57506E; }
      .secLabelEn { font-weight: 600; fill: #8B84A3; }
      .tagText { font-size: 13.5px; font-weight: 700; fill: #FFFFFF; }
      .cardTitle { font-size: 19px; font-weight: 700; fill: #383152; }
      .cardDesc { font-size: 14.5px; fill: #6F6884; }
      .mapTitle { font-size: 17px; font-weight: 700; }
      .statusText { font-size: 15px; font-weight: 600; fill: #675F7B; }
      .safetyLead { font-size: 17.5px; font-weight: 700; fill: #3D3B55; }
      .safetyCore { font-size: 17.5px; font-weight: 700; fill: #5E4BD8; }
      .safetyNote { font-size: 14.5px; fill: #756E87; }
    </style>
  </defs>

  <rect x="1" y="1" width="1598" height="758" rx="26" fill="url(#bg)" stroke="#E2DCF0" stroke-width="2"/>
  <g clip-path="url(#card)">
    <circle cx="1502" cy="66" r="92" fill="#BDEDDD" opacity="0.18"/>
    <circle cx="86" cy="706" r="112" fill="#DCD4FF" opacity="0.18"/>
  </g>

  <!-- Positioning band -->
  <rect x="44" y="40" width="1512" height="136" rx="22" fill="url(#violet)"/>
  <text x="82" y="80" class="hdrLabel">项目的一句话 · WHAT THIS IS</text>
  <text x="82" y="130" class="hdrMain">把权威营养资料与指南，转成可追溯、可复用、带人审边界的 agent Skill 与工作流</text>
  <rect x="1276" y="56" width="252" height="38" rx="19" fill="#FFFFFF" opacity="0.16"/>
  <text x="1402" y="81" text-anchor="middle" class="chipText">Evidence → Skill → Workflow</text>

  <!-- Audience routes -->
  <text x="46" y="222" class="secLabel">我从哪里开始？ <tspan class="secLabelEn">· Where do I start</tspan></text>

  <g>
    <rect x="44" y="240" width="360" height="130" rx="18" fill="#FFF6F4" stroke="#F4DCD5" stroke-width="1.5"/>
    <rect x="66" y="260" width="64" height="27" rx="13.5" fill="#F28B7A"/>
    <text x="98" y="279" text-anchor="middle" class="tagText">公众</text>
    <text x="66" y="322" class="cardTitle">科普入口</text>
    <text x="66" y="350" class="cardDesc">看可信、易懂的营养教育</text>

    <rect x="428" y="240" width="360" height="130" rx="18" fill="#F6F4FF" stroke="#E2DCF8" stroke-width="1.5"/>
    <rect x="450" y="260" width="92" height="27" rx="13.5" fill="#7460D7"/>
    <text x="496" y="279" text-anchor="middle" class="tagText">专业人员</text>
    <text x="450" y="322" class="cardTitle">复核工作流</text>
    <text x="450" y="350" class="cardDesc">整理记录 · 审阅草案 · 科普初稿</text>

    <rect x="812" y="240" width="360" height="130" rx="18" fill="#F1FAF7" stroke="#D6EEE6" stroke-width="1.5"/>
    <rect x="834" y="260" width="64" height="27" rx="13.5" fill="#55B89F"/>
    <text x="866" y="279" text-anchor="middle" class="tagText">研究</text>
    <text x="834" y="322" class="cardTitle">方法与证据</text>
    <text x="834" y="350" class="cardDesc">可追溯的结构与证据边界</text>

    <rect x="1196" y="240" width="360" height="130" rx="18" fill="#F3F7FE" stroke="#D9E4F6" stroke-width="1.5"/>
    <rect x="1218" y="260" width="136" height="27" rx="13.5" fill="#5D8FD7"/>
    <text x="1286" y="279" text-anchor="middle" class="tagText">Agent · 开发者</text>
    <text x="1218" y="322" class="cardTitle">安装与接入</text>
    <text x="1218" y="350" class="cardDesc">加载 SKILL.md · 接进工作流</text>
  </g>

  <!-- Content map -->
  <text x="46" y="418" class="secLabel">内容地图 <tspan class="secLabelEn">· 不同内容各有位置</tspan></text>

  <g>
    <rect x="44" y="436" width="360" height="106" rx="18" fill="#F6F4FF" stroke="#E2DCF8" stroke-width="1.5"/>
    <text x="66" y="480" class="mapTitle" fill="#5E4BD8">01 · 食养 Guidance Skills</text>
    <text x="66" y="512" class="cardDesc">教育与专业复核辅助</text>

    <rect x="428" y="436" width="360" height="106" rx="18" fill="#F0FAF7" stroke="#D6EEE6" stroke-width="1.5"/>
    <text x="450" y="480" class="mapTitle" fill="#3C9D87">02 · 参考数据</text>
    <text x="450" y="512" class="cardDesc">食物成分 · GI 表 · 营养素定义</text>

    <rect x="812" y="436" width="360" height="106" rx="18" fill="#FFF7F3" stroke="#F4DCD5" stroke-width="1.5"/>
    <text x="834" y="480" class="mapTitle" fill="#D97663">03 · 科普与媒体</text>
    <text x="834" y="512" class="cardDesc">公众沟通 · 科普网页与媒体生产</text>

    <rect x="1196" y="436" width="360" height="106" rx="18" fill="#F3F7FE" stroke="#D9E4F6" stroke-width="1.5"/>
    <text x="1218" y="480" class="mapTitle" fill="#547FC6">04 · 方法 · 工作流 · 研究</text>
    <text x="1218" y="512" class="cardDesc">蒸馏方法 · Loop 助手 · 多 Agent 研究</text>
  </g>

  <!-- Status strip -->
  <rect x="44" y="566" width="1512" height="42" rx="21" fill="#F0EDF8"/>
  <text x="800" y="593" text-anchor="middle" class="statusText">状态只标注仓库能证实的事实：可用内容 · 专业复核工作流 · 研究探索 · 维护中</text>

  <!-- Safety strip -->
  <rect x="44" y="630" width="1512" height="92" rx="20" fill="#FFFFFF" stroke="#E2DCF0" stroke-width="1.5"/>
  <circle cx="92" cy="676" r="21" fill="#59BFA7"/>
  <path d="M82 676 L89 683 L103 668" fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="132" y="669"><tspan class="safetyLead">安全边界：</tspan><tspan class="safetyCore">用于营养教育、资料结构化与专业复核辅助</tspan></text>
  <text x="132" y="700" class="safetyNote">不替代医学诊断、个体化处方或治疗；涉及风险、证据缺口与法规判断时，交由合格专业人员与真实来源复核。</text>
</svg>
