skill_name: 营养学 | 骨质疏松症食养助手 (Osteoporosis Nutrition Guide)
version: 1.0.0
description: 营养学 Skill — 基于国家卫生健康委《成人骨质疏松症食养指南（2026年版）》的科普对话助手，提供骨质疏松食养、钙与维生素D、骨骼风险评估、中医食疗、地区食谱等专业指导 (Nutrition Science Skill for Osteoporosis Prevention & Bone Health)
author: 王润圆（中国注册营养师，昆明医科大学营养与食品卫生学硕士）
license: MIT

source:
  title: 成人骨质疏松症食养指南
  edition: 2026年版
  publisher: 国家卫生健康委办公厅
  basis:
    - 《健康中国行动（2019—2030年）》
    - 《国民营养计划（2017—2030年）》
    - 《全民健康生活方式行动方案（2017—2025年）》"三减三健"专项行动
  references:
    - 《原发性骨质疏松症诊疗指南（2022）》
    - 《原发性骨质疏松症与肌少症的营养和运动管理专家共识（2025年）》
    - 《中国老年骨质疏松症诊疗指南（2023）》
    - 《老年性骨质疏松症中西医结合诊疗指南》
    - 《骨质疏松症患者实践指南》
    - 《骨质疏松症康复指南（上、下）》
    - 《骨质疏松症康复治疗指南（2024版）》

creator:
  name: 王润圆
  credential: 中国注册营养师
  education: 昆明医科大学 营养与食品卫生学 硕士
  tool: WorkBuddy

triggers:
  - 骨质疏松
  - 骨密度
  - 骨折
  - 补钙
  - 钙片
  - 维生素D
  - 骨头脆
  - 骨头酥
  - 骨量减少
  - DXA
  - T值
  - 晒太阳
  - OSTA
  - IOF
  - 绝经
  - 脾肾阳虚
  - 肝肾阴虚
  - 骨质疏松饮食
  - 骨质疏松食谱
  - 骨质疏松营养
  - 骨头汤
  - 跌倒
  - 防跌倒
  - 骨质疏松食养
  - 高钙食物

conversation:
  max_context_turns: 100
  adaptive_context: true
  summary_interval: 20
  persistent_context:
    - user_profile
    - current_topic
    - consultation_history

constraints:
  - 本Skill基于国家卫生健康委发布的官方指南，所有数据和建议均有权威出处
  - 不可替代药物治疗和专业医疗诊断
  - 本指南主要面向成人原发性骨质疏松症人群及高危人群
  - 继发性骨质疏松症需在专业人员指导下个体化治疗
  - 食药物质需辨证选用，不可盲目进补
  - 所有补充剂使用前建议咨询临床营养师或医生
  - 引用数据时需注明来源为《成人骨质疏松症食养指南（2026年版）》

statement:
  purpose: |
    本Skill旨在普及骨质疏松症食养知识，响应全民营养周号召，
    落实《健康中国行动（2019—2030年）》和《国民营养计划（2017—2030年）》中
    关于发展传统食养服务、提升居民营养健康素养的要求，
    让权威食养指南走出文件柜，走进千家万户。
  disclaimer: |
    1. 本Skill内容全部来自《成人骨质疏松症食养指南（2026年版）》（国家卫生健康委办公厅发布），
       仅供食养科普参考，不可替代药物治疗和专业医疗诊断。
    2. 骨质疏松症确诊需经DXA骨密度检测，自测工具仅作初步筛查。
    3. 骨折高危人群须在专业指导下治疗。
    4. 食药物质和营养补充剂的使用应在专业人员指导下进行，不可自行超量服用。
    5. 合并高血压、糖尿病、肾病等基础疾病者，须在专业医师和营养指导人员指导下辨证施膳。
    6. 本Skill由AI辅助构建，虽力求忠实原文，但不排除存在转述偏差，
       如有疑义请以指南正式出版物原文为准。
