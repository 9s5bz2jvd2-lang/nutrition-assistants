# — V2 Runtime Prerequisites —
v2_runtime:
  method: sparse-book-to-skill-distillation-v2
  purpose: complete one-time semantic distillation followed by sparse runtime retrieval
  required_artifacts:
    semantic_index: expert-index.v2.json
    registry: registry.v2.json
    source_manifest: source-manifest.json
  readiness:
    complete_semantic_review_required: true
    required_levels: [L0, L1, L2, L3]
    cardinality_source: built_registry
    ordering_source: built_registry
    hash_source: source_manifest
    missing_or_stale_artifact: fail_closed
  package_boundary:
    local_trial_paths_forbidden: true
    hard_coded_chunk_counts_forbidden: true
    runtime_status_source: actual_built_artifacts

# — Formula Two-Pass Retrieval + Four-Track Evidence + Regulatory Gate —
formula_full_scan:
  mode: two_pass_plus_four_track_evidence_plus_regulatory
  prerequisite: v2_runtime_ready
  trigger_keywords:
    - "配方"
    - "补剂方案"
    - "营养素组合"
    - "剂量"
    - "protocol"
    - "supplement formula"
    # NEW
    - "法规合规"
    - "regulatory compliance"
    - "market authorization"

  # NEW: pre-formula context/identity gate
  context_identity_gate:
    contract_doc: reference/formula_context_identity_gate.md
    required_context_fields:
      - formula_purpose
      - intended_use
      - product_category
      - target_markets
      - target_population
    required_ingredient_fields:
      - common_name
      - scientific_latin_name
      - plant_part
      - processing_preparation
      - extract_ratio_or_marker
      - chemical_form
      - dose_and_unit
    botanical_fail_closed_rules:
      - species_ambiguity
      - plant_part_ambiguity
      - extract_specification_missing

  phase_a_targeted_deep_retrieval:
    purpose: retrieve and deep-read only chunks directly relevant to the case
    query_dimensions:
      - purpose
      - symptoms
      - diagnoses
      - medications
      - contraindications
      - nutrients
      - special_populations
      - target_markets
    selection_source: built semantic index and registry
    loading_rule: selected canonical chunks must be loaded from the exact original text

  phase_b_corpus_wide_omission_safety_sweep:
    purpose: check every canonical registry chunk's compact index for omissions, conflicts, interactions, safety red lines, and uncertainty
    iteration_source: built registry stable order
    sweep_fields:
      - l0_weighted_triggers
      - l0_expert_anti_triggers
      - l1_brief
      - l1_safety_red_lines
      - l1_uncertainty
      - chunk_risk_tags
    escalation_rule: any relevant hit must load and deep-read the exact original chunk
    allowed_terminal_sweep_statuses:
      - swept
      - escalated_resolved
    blocking_statuses:
      - pending
      - unreadable
      - escalated_unresolved

  # Mode C v3: four evidence tracks + separate reminder/safety sidecar
  four_track_evidence:
    contract_doc: reference/layer8_evidence_query.md
    automatic_mode_c_contract: reference/mode_c_automatic_contract.md
    template: templates/evidence_matrix_template.md
    two_column_output_template: templates/mode_c_two_column_output_template.md
    ledger_template: reference/evidence_ledger_template.json
    search_ledger_template: templates/search_ledger_template.md
    tracks:
      - track_1_human_clinical
      - track_2_animal_in_vivo
      - track_3_tcm_material
      - track_4_regulatory
    tcm_tier_separation:
      t1_classical: traditional_record_only
      t2_pharmacopeial: pharmacopeial_standard
      t3_modern_clinical: assessed_as_track_1
    cross_tier_promotion: prohibited
    reminder_safety_sidecar:
      mechanism_is_not_efficacy_proof: mandatory_true
      cannot_support_human_efficacy_or_regulatory_clearance: true

  # NEW: personalized formula intake and triage
  # NEW: personalized formula intake and triage
  personalized_formula:
    个性化接诊: true
    contract_doc: reference/individualized_formula_intake_contract.md
    automatic_mode_c_contract_doc: reference/mode_c_automatic_contract.md
    triage_doc: reference/risk_triage_contract.md
    selection_flow_doc: reference/personalized_selection_flow.md
    draft_template: templates/personalized_formula_draft_template.md
    two_column_output_template: templates/mode_c_two_column_output_template.md
    audit_template: templates/intake_audit_ledger_template.json
    draft_generated_mandatory: true
    unknowns_do_not_suppress_draft: true
    privacy_rules:
      no_pii_required: true
      session_scoped_identifiers: true
      user_reported_default: true
      data_retention_default: session_only
    triage_statuses:
      - incomplete_draft_needs_human_input
      - draft_with_urgent_safety_flag
      - draft_with_mandatory_human_review
      - draft_with_regulatory_gap
      - draft_for_professional_review
      - human_reviewed_finalization
    never_finalized: true
    dose_derivation_prohibition:
      animal_scaling_prohibited: true
      traditional_amount_scaling_prohibited: true
      only_human_evidence_doses: true
    population_level_disclaimer_required: true
    professional_review_checklist_required: true

  # NEW: regulatory gate
  regulatory_gate:
    contract_doc: reference/regulatory_gate.md
    template: templates/regulatory_coverage_matrix_template.md
    ledger_template: reference/regulatory_coverage_ledger_template.json
    source_registry: reference/source_registry.md
    assessment_dimensions:
      - per_ingredient
      - per_jurisdiction
      - per_product_category
    allowed_statuses:
      - permitted
      - conditional
    blocking_statuses:
      - prohibited
      - unknown
      - not_assessed
    global_compliant_requires: all_entries_permitted_or_conditional

  coverage_ledger:
    template: reference/formula_coverage_ledger_template.json
    generation_source: built registry and source manifest
    cardinality_rule: exactly one entry per canonical registry chunk
    order_rule: exact built-registry order
    required_identity_fields:
      - chunk_id
      - chunk_path
      - sha256
    static_prefilled_entry_list_forbidden: true

  finalization_gates:
    gate_a: all Phase A selected chunks deep-read from exact originals
    gate_b: every registry chunk swept exactly once in Phase B
    gate_c: every sweep hit escalated and resolved; any unresolved or unreadable item blocks
    gate_d: every chunk identity and SHA-256 matches registry/source manifest
    gate_e1: unresolved context/identity blocks finalization and specific blocked-identity search only; reviewable draft remains
    gate_e2: every evidence-eligible component has T1/T2/T3/T4 attempt or ledgered block/failure; gaps block finalization only
    gate_e3: human evidence status does not imply efficacy when absent
    gate_e4: animal/traditional/mechanistic not promoted to clinical proof
    gate_e5: regulatory assessment for every ingredient × every jurisdiction × every category
    gate_e6: no fabricated citations or regulatory statuses
    gate_e7: search ledger recorded for all queries
    gate_e8: existing two-pass corpus safety contract retained
    fail_closed: finalization_efficacy_and_market_claims_only
    justification_bypass_forbidden: true

  contract_doc: reference/formula_full_scan_contract.md
  adapter_doc: reference/v2-sparse-dual-mode-adapter.md
