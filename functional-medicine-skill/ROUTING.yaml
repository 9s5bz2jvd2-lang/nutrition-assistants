    - 慢性病根源
    - 健康管理
    - 功能营养
    - 补剂推荐
    - 营养素缺乏
    - 代谢综合征
    - 亚健康

anti_triggers:
  - 只问一个普通营养知识（如"维生素C的作用"）
  - 急性疾患/急症症状（应建议立即就医）
  - 要求确诊疾病（本skill不诊断）
  - 要求替代处方药治疗
  - 只想要普通食谱/膳食指南（应转介食养助手）

neighbors:
  upstream:
    - nutrition-skill-methodology
    - book-to-skill-distillation
  safety:
    - nutrition-history-anti-hallucination-skill
    - anti-hallucination-academic-writing
  adjacent:
    - diabetes-food-guide-skill
    - hypertension-food-guide
    - hyperlipidemia-food-guide
    - gout-dietary-guide
    - osteoporosis-food-guide-skill
    - sarcopenia-food-guide-skill
  output:
    - 四轨证据矩阵（人体/动物/TCM/机制）
    - 法规覆盖矩阵（管辖区/产品类别/成分）
    - TCM身份与物质矩阵
    - 搜索台账
    - 阻断/残余风险摘要

budget:
  layer_1_quick_reference:
    target_tokens: "500-1500"
    when: "快速概览功能医学概念"
  layer_2_imbalances:
    target_tokens: "2000-5000"
    when: "深入某一失衡系统"
  layer_3_genomics_nutrients:
    target_tokens: "2000-5000"
    when: "基因多态性或营养素详解"
  layer_4_formula_design:
    target_tokens: "3000-8000"
    when: "设计补剂配方"
  layer_5_cases:
    target_tokens: "1000-3000"
    when: "参考病例"
  layer_6_special_populations:
    target_tokens: "500-2000"
    when: "特殊人群调整"
  layer_7_full_knowledge:
    target_tokens: "on-demand only"
    when: "需要原文级深度引用"
  layer_8_evidence_query:
    target_tokens: "per-nutrient four-track lookup"
    when: "配方生成后强制执行四轨证据+法规门控"

missed_case_sweep:
  required:
    - safety_red_line_check        # 是否触犯安全红线
    - special_population_check      # 是否涉及特殊人群
    - drug_interaction_check        # 是否有药物-营养素相互作用风险
    - evidence_boundary_check       # 建议是否超出证据层级
    - referral_check                # 是否需要转介就医
    - anti_trigger_check            # 是否误触发
    - citation_verifiability        # 引用是否真实可核验
    # NEW: global evidence/regulatory gate checks
    - context_identity_gate_check   # 配方语境和身份是否已解析
    - four_track_evidence_check     # 四轨证据是否均已执行
    - cross_tier_promotion_check    # TCM跨层升级是否违规
    - regulatory_gate_check         # 法规门控是否通过
    - source_authority_check        # 来源是否为权威来源注册表中的来源
    - fabricated_status_check       # 是否编造法规状态
    # NEW: personalized formula checks
    - intake_completeness_check     # 接诊数据是否完整
    - triage_status_check           # 风险分诊是否已执行
    - privacy_minimization_check    # 隐私最小化是否合规
    - dose_derivation_check         # 剂量是否仅来自人群证据
    - population_evidence_disclaimer_check  # 群体证据声明是否已添加
    - professional_review_checklist_check   # 专业审阅清单是否已附加
  high_risk_extra:
    - pregnancy_lactation_flag      # 孕妇/哺乳期标注
    - pediatric_flag                # 儿童标注
    - hepatic_renal_flag            # 肝肾障碍标注
    - eating_disorder_language_check # 羞耻语言检查

route_log_fields:
