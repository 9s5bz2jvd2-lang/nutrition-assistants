skill_name: 营养学 | 高尿酸血症与痛风营养助手 (Hyperuricemia & Gout Dietary Guide)
version: 1.1.0
description: >-
  Load when 用户提到痛风、高尿酸、尿酸高、嘌呤、大脚趾红肿热痛、
  关节结晶，或问"尿酸高能吃什么""痛风发作怎么办""怎么降尿酸""XX食物嘌呤多少"。
  涵盖急性期/缓解期饮食、中医辨证施膳（湿热/湿浊/痰瘀/脾肾亏虚）、
  食物嘌呤查询（400+种）、72套地区×季节食谱定制。
