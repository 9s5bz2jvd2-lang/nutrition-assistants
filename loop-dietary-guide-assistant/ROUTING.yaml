# ROUTING.yaml — loop-dietary-guide-assistant sparse overlay

role: combined_loop_and_dietary_guidance_router
activation_model: "shared-core + top-k routed experts + missed-case sweep"

trigger_terms:
  strong:
    - dietary loop
    - dietary guide assistant
    - nutrition agent loop
    - dietary triage loop
    - dietary claim verification
    - dietary compliance check
    - maker-checker dietary
    - dietary question classification
    - loop-dietary-guide
    - autonomous dietary advice
    - dietary state tracking
  weak:
    - nutrition automation
    - dietary AI agent
    - guideline checker
    - nutrition verification
    - dietary assistant design

anti_triggers:
  - single dietary question (use cspi-uncompromised-dga)
  - loop infrastructure only (use loop-engineering)
  - clinical nutrition therapy
  - non-U.S. dietary guideline loop

neighbors:
  upstream:
    - cspi-uncompromised-dga
    - loop-engineering
    - book-to-skill-distillation
  safety:
    - medical-nutrition-boundary
    - special-population-gate
    - evidence-source-gate
    - verification-debt-guard
    - cognitive-surrender-guard
  adjacent:
    - food-agent-methodology
    - nutrition-ai-productization
  output:
    - loop-design-document
    - dietary-guidance-response
    - state-file

budget:
  shared_core:
    target_tokens: "200-800"
    cache_tier: stable_prefix
  routed_expert:
    target_tokens: "800-3000"
    cache_tier: variable_by_task
  missed_case_sweep:
    target_tokens: "200-800"
    cache_tier: stable_checklist
  heavy_reference:
    target_tokens: "on-demand only"
    cache_tier: variable_suffix

sparse_activation:
  seed_strategy: "keyword/task signature -> seed nodes -> point-to-point graph expansion -> missed-case sweep"
  default_top_k: 2
  max_top_k: 4
  rules:
    - "Always load shared core first."
    - "Loop design tasks load loop-architecture + triage-loop."
    - "Verification tasks load maker-checker + guidelines-content."
    - "Danger check tasks load dangers-in-context."
    - "Always run missed-case sweep: special populations, medical boundary, official vs. uncompromised."

missed_case_sweep:
  required:
    - special_population_check
    - medical_advice_boundary
    - official_vs_uncompromised_clarification
    - maker_checker_split_enforced
    - state_on_disk_not_in_context
    - verification_gate_present
  high_risk_extra:
    - alcohol_context_required
    - infant_feeding_specificity
    - stale_guideline_check
    - comprehension_debt_check
    - cognitive_surrender_guard

route_log_fields:
  - task_summary
  - selected_experts
  - skipped_experts
  - sweep_items_checked
  - sweep_hits
  - budget_tier
  - output_artifacts
  - followup_needed
