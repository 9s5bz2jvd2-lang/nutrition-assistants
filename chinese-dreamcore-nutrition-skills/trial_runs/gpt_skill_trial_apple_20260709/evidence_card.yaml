topic_id: apple_nutrition
中文主题: 苹果的营养
主题定位: 普通人日常水果营养科普；不做疾病治疗、不做减肥承诺、不做处方化建议
目标人群: 家庭科普 / 普通成年人
风格门: 中式梦核营养 + 可爱温柔
证据状态: 仅科普常识（本次生产试跑未做外部营养事实核验）
一句主信息: 苹果可以作为日常水果之一，适合用温和方式提醒大家吃完整鲜果、不把普通食物神化。
可说内容:
  - 完整鲜果用于日常饮食表达时，比把水果说成药方更稳妥。
  - 清洗后的苹果可按个人习惯选择是否带皮食用；画面不暗示治疗或特殊功效。
  - 苹果是普通水果，不是神奇药方；相关营养表达应保持保守。
  - 如需个体化饮食建议，应咨询医生或注册营养师等专业人员。
不可说内容:
  - 治疗疾病
  - 保证减重
  - 排毒、清除毒素、逆转疾病
  - 编造文献、指南、专家共识或具体年份
  - 把苹果画成药物或处方
  - 对糖尿病、肾病等特殊人群给出未经核验的具体建议
允许画面元素:
  - round fresh apple
  - small white porcelain plate
  - warm wooden table
  - moon-gate window / round window
  - bamboo curtain
  - rice-paper-like warm light
  - soft blank area for later Chinese typography
禁止画面元素:
  - 药瓶
  - 医院或诊断场景
  - 针管、药片、处方单
  - 减肥前后对比
  - 恐怖走廊、废弃空间、眼睛凝视
  - 伪文字、乱码、logo、水印
  - 宗教、玄学、风水、仙侠符号堆叠
图中文字来源:
  - 本证据卡中的保守示例文案；本次只做工作流试跑，不作为公开发布用事实核验材料
