skill_name: 营养学 | 肌少症食养助手 (Sarcopenia Nutrition Guide)
version: 1.1.1
description: 营养学 Skill — 基于国家卫生健康委《成人肌少症食养指南（2026年版）》的科普对话助手，提供肌少症食养、营养补充、中医食疗、地区食谱等专业指导 (Nutrition Science Skill for Sarcopenia Prevention)
author: 王润圆（中国注册营养师，昆明医科大学营养与食品卫生学硕士）
license: MIT

source:
  title: 成人肌少症食养指南
  edition: 2026年版
  publisher: 国家卫生健康委办公厅
  basis:
    - 《健康中国行动（2019—2030年）》
    - 《国民营养计划（2017—2030年）》
  references:
    - 欧洲肌少症共识（EWGSOP 2014，EWGSOP 2019）
    - 亚洲肌少症工作组专家共识（AWGS 2019，AWGS 2025）
    - 《肌肉衰减综合征营养与运动干预中国专家共识》（2015）
    - 《老年人肌少症口服营养补充中国专家共识》（2019）
    - 《预防老年人肌少症核心信息中国专家共识》（2021）
    - 《中国老年人肌少症诊疗专家共识》（2021）
    - 《老年人肌少症防控干预中国专家共识》（2023）
    - 《老年人肌少症门诊管理规范中国专家共识（2024版）》
    - 《中国肌肉减少症诊疗指南（2024版）》
    - 《肌少症膳食营养处方及运动干预中国专家共识》（2025）
    - 《肌少症膳食营养管理规范》团体标准（中国营养学会，2025）
    - 新加坡肌少症筛查诊断和干预管理临床指南
    - 韩国肌少症工作组筛查和诊断共识
    - 澳新肌少症诊断和管理指南（2023）
    - 《少肌性肥胖的定义和诊断标准共识》（2022，欧洲临床营养与代谢学会/欧洲肥胖研究学会）
    - 《慢性肾脏病肌少症诊断、治疗与预防专家共识（2024年版）》

creator:
  name: 王润圆
  credential: 中国注册营养师
  education: 昆明医科大学 营养与食品卫生学 硕士
  tool: WorkBuddy

triggers:
  - 肌少症
  - 肌肉流失
  - 肌肉衰减
  - 肌肉萎缩
  - 瘘证
  - 老年人营养不良
  - 老年人蛋白质
  - 抗阻运动
  - 食养
  - 食药物质
  - 握力下降
  - 小腿围
  - SARC-F
  - 乳清蛋白
  - 亮氨酸
  - CaHMB
  - 肌少症食谱
  - 脾胃虚弱
  - 肝肾不足
  - 脾胃湿热
  - 老年人跌倒
  - 肌肉量下降
  - 步速下降
  - 起坐困难

conversation:
  max_context_turns: 100
  adaptive_context: true
  summary_interval: 20
  persistent_context:
    - user_profile
    - current_topic
    - consultation_history

constraints:
  - 本Skill基于国家卫生健康委发布的官方指南，所有数据和建议均有权威出处
  - 不可替代药物治疗和专业医疗诊断
  - 合并基础疾病者需在专业医师指导下调整食养方案
  - 食药物质需辨证选用，不可盲目进补
  - 所有补充剂使用前建议咨询临床营养师或医生
  - 引用数据时需注明来源为《成人肌少症食养指南（2026年版）》

statement:
  purpose: |
    本Skill旨在普及肌少症食养知识，响应全民营养周号召，
    落实《健康中国行动（2019—2030年）》和《国民营养计划（2017—2030年）》中
    关于发展传统食养服务、提升居民营养健康素养的要求，
    让权威食养指南走出文件柜，走进千家万户。
  disclaimer: |
    1. 本Skill内容全部来自《成人肌少症食养指南（2026年版）》（国家卫生健康委办公厅发布），
       仅供食养科普参考，不可替代药物治疗和专业医疗诊断。
    2. 肌少症的确诊需由医疗机构综合评估，本Skill提供的筛查工具仅作初步风险提示。
    3. 食药物质和营养补充剂的使用应在专业人员指导下进行，不可自行超量服用。
    4. 合并糖尿病、慢性肾脏病、肿瘤等基础疾病者，须在专业医师和营养指导人员指导下辨证施膳。
    5. 本Skill由AI辅助构建，虽力求忠实原文，但不排除存在转述偏差，
       如有疑义请以指南正式出版物原文为准。
