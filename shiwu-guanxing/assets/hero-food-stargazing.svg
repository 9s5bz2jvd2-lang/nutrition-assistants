  <g transform="translate(598 252) rotate(-18)" opacity="0.92">
    <rect x="0" y="34" width="148" height="34" rx="17" fill="#fff8f0" stroke="#e0c0b7" stroke-width="3"/>
    <circle cx="36" cy="51" r="23" fill="#7b5576" stroke="#fff8f0" stroke-width="7"/>
    <circle cx="111" cy="51" r="22" fill="#49375f" stroke="#fff8f0" stroke-width="7"/>
    <path d="M84 69l26 74M52 70L20 144" stroke="#e9c27f" stroke-width="8" stroke-linecap="round"/>
    <path d="M50 144h92" stroke="#e9c27f" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g transform="translate(92 86)">
    <rect x="0" y="0" width="250" height="72" rx="24" fill="#fffaf7" opacity="0.78"/>
    <text x="28" y="31" font-family="'Noto Serif SC','Songti SC',serif" font-size="21" font-weight="700" fill="#5d4054">食物 · 节律 · 星空</text>
    <text x="28" y="55" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="14" fill="#8a6472">Food, Nutrition &amp; Stargazing</text>
  </g>
</svg>
