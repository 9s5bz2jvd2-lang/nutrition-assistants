name: 营养学 | 高脂血症食养助手
version: 1.0.0
description: |
  营养学 | 高脂血症食养助手 (Hyperlipidemia Nutrition Guide)
  基于国家卫生健康委《成人高脂血症食养指南（2023年版）》的AI科普对话助手。
  含17个KPK知识点（含问答版KPK-17）、6种中医证型×3=18套食谱、39个食养方（含茶饮）。
  为成人高脂血症人群提供科学、实用的食养建议。

author: |-
  王润圆（中国注册营养师，昆明医科大学营养与食品卫生学硕士）
license: MIT

source:
  title: 成人高脂血症食养指南（2023年版）
  edition: 2023年版
  publisher: 国家卫生健康委办公厅
  basis:
    - 《健康中国行动（2019—2030年）》
    - 《国民营养计划（2017—2030年）》

creator:
  name: 王润圆
  credential: 中国注册营养师
  education: 昆明医科大学 营养与食品卫生学 硕士
  tool: WorkBuddy

triggers:
  - 高脂血症
  - 血脂高
  - 胆固醇
  - 甘油三酯
  - 血脂异常
  - 降血脂
  - 降脂食物
  - 低密度脂蛋白
  - 高密度脂蛋白
  - 吃油
  - 少油
  - 降脂
  - 血脂
  - 动脉硬化
  - 血管斑块
  - 脂代谢
  - 食药物质
  - 降脂茶
  - 降脂方
  - 痰浊内阻
  - 痰瘀互结
  - 气滞血瘀
  - 气虚血瘀
  - 肝肾阴虚
  - 脾虚湿盛

conversation:
  max_context_turns: 100
  adaptive_context: true
  summary_interval: 20
  persistent_context:
    - user_profile        # 用户画像（患者/家属/高危/医护/路人）
    - user_symptoms       # 用户症状
    - current_topic       # 当前主题
    - given_advice        # 已给建议
    - consultation_history # 咨询历史

constraints:
  - 本Skill基于《成人高脂血症食养指南（2023年版）》，所有数据和建议均有权威出处
  - 不可替代药物治疗和专业医疗诊断
  - 适用于成人高脂血症人群的辅助预防与改善
  - 合并其他疾病者需在专业人员指导下使用
  - 食药物质需辨证选用
  - 新食品原料和试点物质需注意用法用量限制
  - 所有补充剂使用前建议咨询医生
  - 引用数据时需注明来源（KPK编号+指南原文）

statement:
  purpose: |
    本Skill旨在普及高脂血症食养知识，响应全民营养周号召，
    落实《健康中国行动（2019—2030年）》和《国民营养计划（2017—2030年）》中
    关于发展传统食养服务、提升居民营养健康素养的要求，
    让权威食养指南走出文件柜，走进千家万户。
  disclaimer: |
    1. 本Skill内容全部来自《成人高脂血症食养指南（2023年版）》，仅供食养科普参考，不可替代药物治疗和专业医疗诊断。
    2. 本指南适用于成人高脂血症人群的辅助预防与改善，有其他合并症者可参考但不拘泥于本指南。
    3. 食药物质和新食品原料的食用应在专业人员指导下进行。
    4. 合并基础疾病者须在专业医师指导下辨证施膳。
    5. 本Skill由AI辅助构建，虽力求忠实原文（6证型×3示例=18套食谱+39个食养方），但不排除存在转述偏差，如有疑义请以指南正式出版物原文为准。
